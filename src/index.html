<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon Set (rutas relativas para que Vite las reescriba en build) -->
    <!-- Prefer explicit existing assets; add fallback data URI to avoid 404 on /favicon.ico during dev -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' fill='%23863bff'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="site.webmanifest" />
    
    <!-- SEO / Social -->
    <meta name="description" content="WatchVault — Administra tu lista de ver para después en YouTube de forma inteligente." />
    <meta property="og:title" content="WatchVault" />
    <meta property="og:description" content="Organiza y guarda videos de YouTube para ver después. Fácil y rápido." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="favicon-96x96.png" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
    <meta name="color-scheme" content="dark light">
    
    <title>WatchVault</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
